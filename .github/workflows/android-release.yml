name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # 当你打上 v1.0, v2.0 等类似标签并推送时自动触发构建发布
  workflow_dispatch: # 让你可以在网页端手动点击运行

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 下载代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Gradle 环境
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: 编译 Debug 版 APK
        # 直接使用安装好的 gradle 构建，而不需要 ./gradlew
        run: gradle assembleDebug

      - name: 重命名 APK 文件
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AndroidVRPlayer.apk

      - name: 收集 APK 作为产物存档
        uses: actions/upload-artifact@v4
        with:
          name: AndroidVRPlayer-APK
          path: app/build/outputs/apk/debug/AndroidVRPlayer.apk

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/AndroidVRPlayer.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
